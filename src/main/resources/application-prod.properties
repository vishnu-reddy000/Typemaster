# ==========================================================================
# TypeMaster - Production Application Configuration Profile (prod)
# ==========================================================================

# --------------------------------------------------------------------------
# Server Configuration
# --------------------------------------------------------------------------
server.port=${PORT:8080}
server.servlet.context-path=/
server.shutdown=graceful

# --------------------------------------------------------------------------
# Spring Application
# --------------------------------------------------------------------------
spring.application.name=TypeMaster

# --------------------------------------------------------------------------
# Railway MySQL Database Configuration
# --------------------------------------------------------------------------

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --------------------------------------------------------------------------
# Hikari Connection Pool
# --------------------------------------------------------------------------
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=TypeMasterHikariCP

# --------------------------------------------------------------------------
# Hibernate / JPA
# --------------------------------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# --------------------------------------------------------------------------
# Static Resource Cache
# --------------------------------------------------------------------------
spring.web.resources.cache.cachecontrol.max-age=2592000
spring.web.resources.cache.cachecontrol.cache-public=true