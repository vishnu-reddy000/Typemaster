# ==========================================================================
# TypeMaster - Production Application Configuration Profile (prod)
# ==========================================================================

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/
server.shutdown=graceful

# Spring Application Configuration
spring.application.name=TypeMaster

# Production Database (MySQL) Configuration
# Credentials are read dynamically from environment variables for security compliance
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:typemaster}?createDatabaseIfNotExist=false&useSSL=true&requireSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=false
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Hikari Connection Pool Settings for High Throughput
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=TypeMasterHikariCP

# Production JPA / Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Prevent automatic schema generation/modification in production for database safety
spring.jpa.hibernate.ddl-auto=validate
# Disable verbose SQL query logging in console to preserve logs disk storage
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Cache Configurations for Static Content (AdSense speed improvements)
spring.web.resources.cache.cachecontrol.max-age=2592000
spring.web.resources.cache.cachecontrol.cache-public=true
