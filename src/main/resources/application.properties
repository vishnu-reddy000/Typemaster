# Server Port
server.port=8084

# Spring Application Name
spring.application.name=TypeMaster

# MySQL Database Configuration
# Automatically creates the database 'typemaster' if it doesn't exist yet
spring.datasource.url=jdbc:mysql://localhost:3306/typemaster?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate Configuration for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
