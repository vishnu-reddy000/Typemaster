<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 110" width="100%" height="100%">
  <defs>
    <linearGradient id="tmShieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="tmGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <g transform="translate(5, 5)">
    <!-- Speed Motion Trails -->
    <path d="M 2 35 L 22 35" stroke="#38bdf8" stroke-width="5" stroke-linecap="round"/>
    <path d="M 0 50 L 18 50" stroke="#0ea5e9" stroke-width="5" stroke-linecap="round"/>
    <path d="M 5 65 L 20 65" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>

    <!-- Main Emblem Shield Container -->
    <rect x="22" y="5" width="90" height="90" rx="22" fill="url(#tmShieldGrad)" filter="url(#tmGlow)"/>

    <!-- Keyboard Rows Graphic inside Emblem -->
    <rect x="34" y="62" width="14" height="8" rx="2" fill="#ffffff" opacity="0.9"/>
    <rect x="51" y="62" width="14" height="8" rx="2" fill="#ffffff" opacity="0.9"/>
    <rect x="68" y="62" width="14" height="8" rx="2" fill="#ffffff" opacity="0.9"/>
    <rect x="85" y="62" width="14" height="8" rx="2" fill="#ffffff" opacity="0.9"/>

    <rect x="39" y="73" width="56" height="8" rx="3" fill="#ffffff" opacity="0.95"/>

    <!-- Styled TM Lettermark inside Emblem -->
    <text x="67" y="48" font-family="'Poppins', sans-serif" font-size="38" font-weight="900" font-style="italic" fill="#ffffff" text-anchor="middle" letter-spacing="-2">TM</text>
  </g>
</svg>
