<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <linearGradient id="tmShieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="tmTextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="tmGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Group: Logo Icon -->
  <g transform="translate(10, 10)">
    <!-- Speed Motion Trails -->
    <path d="M 5 35 L 25 35" stroke="#38bdf8" stroke-width="5" stroke-linecap="round"/>
    <path d="M 0 50 L 20 50" stroke="#0ea5e9" stroke-width="5" stroke-linecap="round"/>
    <path d="M 10 65 L 25 65" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>

    <!-- Main Emblem Shield (Transparent Rounded Container) -->
    <rect x="25" y="5" width="90" height="90" rx="22" fill="url(#tmShieldGrad)" filter="url(#tmGlow)"/>

    <!-- Keyboard Rows Graphic inside Emblem -->
    <rect x="37" y="62" width="14" height="8" rx="2" fill="#ffffff" opacity="0.9"/>
    <rect x="54" y="62" width="14" height="8" rx="2" fill="#ffffff" opacity="0.9"/>
    <rect x="71" y="62" width="14" height="8" rx="2" fill="#ffffff" opacity="0.9"/>
    <rect x="88" y="62" width="14" height="8" rx="2" fill="#ffffff" opacity="0.9"/>

    <rect x="42" y="73" width="56" height="8" rx="3" fill="#ffffff" opacity="0.95"/>

    <!-- Styled TM Lettermark inside Emblem -->
    <text x="70" y="48" font-family="'Poppins', sans-serif" font-size="38" font-weight="900" font-style="italic" fill="#ffffff" text-anchor="middle" letter-spacing="-2">TM</text>
  </g>

  <!-- Group: Typography (TYPEMASTER + Tagline) -->
  <g transform="translate(135, 10)">
    <!-- Brand Title -->
    <text x="0" y="58" font-family="'Poppins', 'Inter', sans-serif" font-size="44" font-weight="900" fill="url(#tmTextGrad)" letter-spacing="1">TYPEMASTER</text>
    
    <!-- Accent Line -->
    <line x1="2" y1="72" x2="280" y2="72" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
    
    <!-- Subtitle Tagline -->
    <text x="4" y="92" font-family="'Poppins', sans-serif" font-size="12.5" font-weight="700" fill="#64748b" letter-spacing="3.5">TYPE BETTER. EVERY DAY.</text>
  </g>
</svg>
